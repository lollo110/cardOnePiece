site:
  name: Pirate Card Blog
  about:
    title: À propos de Pirate Card Blog
    intro: Pirate Card Blog est un site communautaire dédié à la découverte des cartes, au suivi des séries et aux discussions autour du One Piece Card Game.
    section_1:
      title: Ce que vous pouvez faire ici
      paragraph_1: Parcourez la collection, recherchez une carte par nom ou par code, et ouvrez une page détaillée dédiée à chaque carte.
      paragraph_2: Participez aux discussions communautaires autour de la collection, des échanges, du deckbuilding, des matchups et du jeu en général.
    section_2:
      title: Esprit de la communauté
      paragraph_1: L’objectif est de garder un site accueillant, utile et simple à utiliser, aussi bien pour les collectionneurs que pour les joueurs.
      paragraph_2: Les commentaires peuvent être modérés afin de limiter les contenus abusifs, haineux ou inappropriés et de préserver la qualité des échanges.
    section_3:
      title: Projet indépendant
      paragraph_1: Pirate Card Blog est un projet de fans indépendant et n’est pas un site officiel de Bandai, Toei, Shueisha ou des éditeurs du One Piece Card Game.
      paragraph_2: Les noms de cartes, visuels et marques restent la propriété de leurs détenteurs respectifs.
    section_4:
      title: Donnees de cartes externes
      paragraph_1: Les informations de cartes et de prix peuvent etre fournies par l'API CardTrader pour soutenir les pages de cartes, le deckbuilding et les graphiques d'historique de prix.
      paragraph_2: Le site n'a pas pour objectif de redistribuer toute la base CardTrader ni de remplacer les services CardTrader.
  contact:
    title: Contact et modération
    intro: Les questions liées à la modération, aux commentaires publiés ou à l’accès au compte peuvent être traitées par l’équipe du site.
    section_1:
      title: Demandes liées aux commentaires et à la modération
      paragraph_1: Si un commentaire doit être vérifié, masqué ou supprimé, indiquez la page de carte ou le salon concerné ainsi que suffisamment d’informations pour identifier rapidement la demande.
      paragraph_2: Les messages liés à la modération doivent être clairs, factuels et inclure si possible la date ou le nom visible de l’auteur.
    section_2:
      title: Questions de compte
      paragraph_1: Si vous ne pouvez pas vous connecter ou accéder à votre compte, vérifiez d’abord vos identifiants sur la page de connexion.
      paragraph_2: Avant la mise en ligne, cette page devra contenir l’adresse e-mail publique ou le contact utilisé pour les demandes liées au compte et à la vie privée.
  legal:
    title: Mentions légales
    intro: Cette page présente les informations légales relatives à la publication et au fonctionnement de Pirate Card Blog.
    section_1:
      title: Éditeur du site
      paragraph_1: "Nom du site : Pirate Card Blog."
      paragraph_2: "Responsable de publication : l’exploitant chargé de la publication et de la gestion du site."
      paragraph_3: Avant la mise en ligne, cette section devra être complétée avec l’identité réelle de l’éditeur, son adresse postale et les coordonnées requises pour la publication.
    section_2:
      title: Hébergement
      paragraph_1: L’hébergeur de production doit être identifié avec son nom, son adresse postale et ses coordonnées.
      paragraph_2: Si l’hébergeur change, cette page devra être mise à jour afin que les informations restent exactes et accessibles.
    section_3:
      title: Propriété intellectuelle
      paragraph_1: La structure du site, les textes éditoriaux originaux et les contributions communautaires originales sont protégés par les règles applicables en matière de propriété intellectuelle.
      paragraph_2: Les noms, visuels et marques liés à One Piece restent la propriété de leurs détenteurs respectifs et sont mentionnés ici uniquement à des fins d’identification et de discussion.
  privacy:
    title: Politique de confidentialité
    intro: Cette page explique comment les données personnelles peuvent être traitées lorsque des visiteurs naviguent sur le site, créent un compte et publient des commentaires.
    section_1:
      title: Données collectées
      paragraph_1: Lorsqu’un compte est créé, le site enregistre les informations nécessaires à la gestion de l’accès, notamment l’adresse e-mail, le nom d’utilisateur et le mot de passe chiffré.
      paragraph_2: Lorsqu’un commentaire est publié, le site enregistre le contenu publié, le nom affiché de l’auteur et les informations techniques nécessaires à la gestion de la discussion.
    section_2:
      title: Finalité du traitement
      paragraph_1: Les données du compte sont utilisées pour l’authentification, la sécurité du compte et la gestion de la communauté.
      paragraph_2: Les données des commentaires sont utilisées pour publier les discussions, appliquer les règles de modération et préserver la sécurité et la lisibilité du site.
    section_3:
      title: Vos droits
      paragraph_1: Les utilisateurs peuvent demander l’accès, la correction ou la suppression de leurs données personnelles, sous réserve des limites légales ou techniques liées à la sécurité du compte et à l’historique de modération.
      paragraph_2: Avant la mise en ligne, cette page devra indiquer le canal de contact utilisé pour traiter les demandes liées à la vie privée et à l’exercice des droits.
    section_4:
      title: Publicite et services externes
      paragraph_1: Si des outils de publicite, d'analyse ou de mesure d'audience sont actives plus tard, la politique de confidentialite et la page cookies devront etre mises a jour avant leur activation.
      paragraph_2: Toute publicite tierce doit rester clairement separee des actions du site et ne doit pas etre placee pour provoquer des clics accidentels.
  terms:
    title: Conditions d’utilisation
    intro: Ces conditions décrivent les principales règles d’utilisation de Pirate Card Blog et de participation à ses espaces communautaires.
    section_1:
      title: Utilisation autorisée
      paragraph_1: Les utilisateurs ne doivent pas publier de contenu illégal, haineux, raciste, menaçant, diffamatoire ou volontairement nuisible.
      paragraph_2: Le spam, l’usurpation d’identité et les tentatives de perturber le service ou de détourner les comptes ne sont pas autorisés.
    section_2:
      title: Contenu communautaire
      paragraph_1: Les utilisateurs restent responsables du contenu qu’ils publient.
      paragraph_2: Le site peut modérer, masquer ou supprimer les commentaires qui enfreignent les règles ou nuisent à la qualité de l’espace communautaire.
    section_3:
      title: Disponibilité du service
      paragraph_1: Le site est fourni en l’état et peut être modifié, suspendu ou mis à jour à tout moment.
      paragraph_2: L’accès peut être limité ou suspendu en cas d’abus, de maintenance ou de problème de sécurité.
    section_4:
      title: Donnees externes et prix
      paragraph_1: Les donnees CardTrader sont des donnees externes utilisees pour soutenir les fonctions communautaires et de deckbuilding du site.
      paragraph_2: Les prix sont indicatifs, peuvent etre depasses et ne doivent pas etre consideres comme des offres garanties ou des conseils financiers.
  cookies:
    title: Cookies
    intro: Cette page explique l’utilisation des cookies et technologies de stockage similaires sur Pirate Card Blog.
    section_1:
      title: Cookies essentiels
      paragraph_1: Le site peut utiliser des cookies de session essentiels pour maintenir la connexion des utilisateurs, protéger les formulaires et sécuriser la navigation.
      paragraph_2: Ces cookies sont nécessaires pour les fonctions principales comme l’accès au compte, la sécurité de session et les actions protégées.
    section_2:
      title: Outils supplémentaires
      paragraph_1: Un stockage technique temporaire peut également être utilisé pour garder certaines parties de l’interface fluides pendant la navigation.
      paragraph_2: Si des outils d’analyse, de publicité ou d’audience tiers sont ajoutés plus tard, cette page devra être mise à jour avant leur activation.
    section_3:
      title: Espaces publicitaires futurs
      paragraph_1: Le site peut reserver des espaces pour une publicite future, mais aucun bloc ne doit imiter un bouton, un formulaire ou une action importante du site.
      paragraph_2: Si un reseau publicitaire est ajoute, cette page devra expliquer les cookies ou technologies utilises par ce service.

